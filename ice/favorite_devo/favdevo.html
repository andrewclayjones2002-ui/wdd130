<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <!-- Add your devotional content here -->
         <table>
  <thead>
    <tr>
      <th>Speaker</th>
      <th>Title</th>
      <th>Location</th>
      <th>Year</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>President Dallin H. Oaks</td>
      <td>Coming Closer to Jesus Christ</td>
      <td>BYU Provo</td>
      <td>2026</td>
    </tr>
    <tr>
      <td>Elder David A. Bednar</td>
      <td>Things as They Really Are 2.0</td>
      <td>BYU Idaho</td>
      <td>2024</td>
    </tr>
     <tr>
      <td>President Alvin F. Meredith III</td>
      <td>Go and Do Thou Likewise</td>
      <td>BYU Idaho</td>
      <td>2026</td>
    </tr>
  </tbody>
</table>

      </div>
    </main>
  </div>
  <form>
<label for="Speaker">Speaker:</label>
<input type="text" id="Speaker" name="Speaker"><br>
<label for="Title">Title:</label>
<input type="text" id="Title" name="Title"><br>
<label for="Location">Location:</label>
<input type="text" id="Location" name="Location"><br>
<label for="Year">Year:</label>
<input type="text" id="Year" name="Year"><br><br>
<input type="submit" value="Submit">
  
</form>
</body>
</html>
